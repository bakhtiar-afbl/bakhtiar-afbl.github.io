<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    AI Adoption Dashboard
  </title>

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- PapaParse -->

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Font -->

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>

    body {
      font-family: 'Inter', sans-serif;
      background: #071226;
      color: white;
    }

    .card-bg {
      background: #0b1730;
    }

  </style>

</head>

<body>

  <!-- HERO -->

  <section class="border-b border-white/10">

    <div class="max-w-5xl mx-auto px-4 py-8">

      <div class="text-center">

        <p
          class="uppercase tracking-[6px] text-[11px] text-cyan-400"
        >

          DAILY REPORT

        </p>

        <h1
          class="text-3xl md:text-5xl font-bold mt-4"
        >

          Team AI Adoption Dashboard

        </h1>

        <p
          class="text-slate-400 text-sm mt-4"
        >

          Live operational AI activity monitoring

        </p>

      </div>

    </div>

  </section>

  <!-- FILTER -->

  <section class="max-w-5xl mx-auto px-4 mt-6">

    <div class="grid md:grid-cols-3 gap-3">

      <input
        type="date"
        id="dateFilter"
        class="card-bg border border-slate-700 rounded-2xl px-4 py-3 text-sm outline-none"
      >

      <select
        id="teamFilter"
        class="card-bg border border-slate-700 rounded-2xl px-4 py-3 text-sm outline-none"
      >

        <option value="">
          All Teams
        </option>

      </select>

      <button
        onclick="applyFilters()"
        class="bg-cyan-500 hover:bg-cyan-400 text-black rounded-2xl py-3 text-sm font-bold transition"
      >

        Generate Report

      </button>

    </div>

  </section>

  <!-- KPI -->

  <section
    id="kpiContainer"
    class="max-w-5xl mx-auto px-4 mt-5 grid md:grid-cols-4 gap-3"
  ></section>

  <!-- REPORT -->

  <section
    id="reportContainer"
    class="max-w-5xl mx-auto px-4 mt-5 pb-20"
  ></section>

  <script src="app.js?v=10"></script>

</body>

</html>

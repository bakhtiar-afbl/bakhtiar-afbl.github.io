<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>AI Adoption Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>

    body {
      font-family: 'Inter', sans-serif;
    }

    .glass {
      backdrop-filter: blur(10px);
    }

  </style>

</head>

<body class="bg-[#0f172a] min-h-screen text-white">

  <!-- HERO -->

  <section class="border-b border-white/10">

    <div class="max-w-6xl mx-auto px-4 py-10">

      <div class="flex items-center justify-between flex-wrap gap-4">

        <div>

          <p class="uppercase tracking-[5px] text-xs text-cyan-400">

            AI DAILY REPORT

          </p>

          <h1 class="text-3xl md:text-5xl font-extrabold mt-3">

            Team AI Adoption Dashboard

          </h1>

          <p class="text-slate-400 mt-3 text-sm">

            Live operational AI activity monitoring

          </p>

        </div>

      </div>

    </div>

  </section>

  <!-- FILTER -->

  <section class="max-w-6xl mx-auto px-4 mt-6">

    <div class="grid md:grid-cols-3 gap-3">

      <input
        type="date"
        id="dateFilter"
        class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3 text-sm outline-none"
      >

      <select
        id="teamFilter"
        class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3 text-sm outline-none"
      >

        <option value="">
          All Teams
        </option>

      </select>

      <button
        onclick="applyFilters()"
        class="bg-cyan-500 hover:bg-cyan-400 text-black font-bold rounded-2xl py-3 transition"
      >

        Generate Report

      </button>

    </div>

  </section>

  <!-- KPI -->

  <section
    id="kpiContainer"
    class="max-w-6xl mx-auto px-4 mt-5 grid md:grid-cols-4 gap-4"
  ></section>

  <!-- REPORT -->

  <section
    id="reportContainer"
    class="max-w-6xl mx-auto px-4 mt-6 pb-20"
  ></section>

  <script src="app.js"></script>

</body>

</html>

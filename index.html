<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>AI Adoption Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body class="bg-[#efede9] min-h-screen">

  <!-- HEADER -->

  <section class="bg-black text-white py-16">

    <div class="max-w-5xl mx-auto text-center">

      <p class="text-sm tracking-[4px] uppercase text-gray-400">
        Daily Report
      </p>

      <h1 class="text-5xl font-bold mt-4">
        Team wise AI Adoption Performance
      </h1>

      <p class="mt-4 text-gray-400">
        How each team is integrating AI into daily work
      </p>

    </div>

  </section>

  <!-- FILTERS -->

  <section class="max-w-5xl mx-auto mt-10 px-4">

    <div class="grid md:grid-cols-3 gap-4">

      <input
        type="date"
        id="dateFilter"
        class="p-4 rounded-xl border border-gray-300"
      >

      <select
        id="teamFilter"
        class="p-4 rounded-xl border border-gray-300"
      >
        <option value="">All Teams</option>
      </select>

      <button
        onclick="applyFilters()"
        class="bg-black text-white rounded-xl p-4 hover:bg-gray-800"
      >
        Generate Report
      </button>

    </div>

  </section>

  <!-- KPI -->

  <section class="max-w-5xl mx-auto mt-10 px-4">

    <div
      id="kpiContainer"
      class="grid md:grid-cols-3 gap-4"
    ></div>

  </section>

  <!-- REPORT CARDS -->

  <section
    id="reportContainer"
    class="max-w-5xl mx-auto mt-10 px-4 pb-20"
  ></section>

  <script src="app.js"></script>

</body>
</html>

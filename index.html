<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>
    AI Adoption Dashboard
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body class="bg-[#efede9] text-gray-800">

  <!-- HERO -->

  <section class="bg-black text-white py-12">

    <div class="max-w-4xl mx-auto px-4 text-center">

      <p class="uppercase tracking-[6px] text-gray-400 text-xs">

        Daily Report

      </p>

      <h1 class="text-3xl md:text-5xl font-bold mt-5">

        Team wise AI Adoption Performance

      </h1>

      <p class="mt-4 text-gray-400 text-sm md:text-base">

        How each team is integrating AI into their daily work

      </p>

    </div>

  </section>

  <!-- FILTERS -->

  <section class="max-w-4xl mx-auto px-4 mt-8">

    <div class="grid md:grid-cols-3 gap-3">

      <input
        type="date"
        id="dateFilter"
        class="bg-white border border-gray-300 rounded-2xl px-5 py-3 text-sm shadow-sm"
      >

      <select
        id="teamFilter"
        class="bg-white border border-gray-300 rounded-2xl px-5 py-3 text-sm shadow-sm"
      >

        <option value="">
          All Teams
        </option>

      </select>

      <button
        onclick="applyFilters()"
        class="bg-black text-white rounded-2xl py-3 text-sm font-semibold hover:bg-gray-800 transition"
      >

        Generate Report

      </button>

    </div>

  </section>

  <!-- KPI -->

  <section
    id="kpiContainer"
    class="max-w-4xl mx-auto px-4 mt-6 grid md:grid-cols-3 gap-3"
  ></section>

  <!-- REPORT -->

  <section
    id="reportContainer"
    class="max-w-4xl mx-auto px-4 mt-8 pb-20"
  ></section>

  <script src="app.js"></script>

</body>

</html>
